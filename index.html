        }

        body {

            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .wrapper {
            background-color: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 750px;
            padding: 30px;
            border: 1px solid var(--border);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        header h1 {
            font-size: 24px;
            color: var(--accent);
            margin-bottom: 5px;
        }

        header p {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
            padding: 12px 18px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .bar-container {
            flex-grow: 1;
            height: 8px;
            background: #485460;
            border-radius: 4px;
            margin: 0 15px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .quiz-box h2 {
            font-size: 17px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .opt-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 18px;
            border-radius: 8px;
            font-size: 15px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .opt-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.15);
            border-color: var(--accent);
        }

        .opt-btn.correct-ans {
            background-color: rgba(46, 213, 115, 0.2) !important;
            border-color: var(--success) !important;
            color: var(--success);
        }

        .opt-btn.wrong-ans {
            background-color: rgba(255, 71, 87, 0.2) !important;
            border-color: var(--danger) !important;
            color: var(--danger);
        }

        .alert-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
        }

        .alert-box.correct-ui {
            background: rgba(46, 213, 115, 0.1);
            border-left: 4px solid var(--success);
            color: var(--success);
        }

        .alert-box.wrong-ui {
            background: rgba(255, 71, 87, 0.1);
            border-left: 4px solid var(--danger);
            color: var(--danger);
        }

        .action-area {
            margin-top: 25px;
            display: flex;
            justify-content: flex-end;
        }

        .action-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            display: none;
            font-weight: bold;
        }

        .action-btn:hover {
            background: #ff7675;
        }

        .score-board {
            text-align: center;
            display: none;
        }

        .score-num {
            font-size: 58px;
            font-weight: bold;
            color: var(--accent);
            margin: 15px 0;
        }

        .eval-msg {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
            color: var(--text-muted);
        }

        .retry-btn {
            background: #0abde3;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;

</head>

        },
        {
            q: "Adat tradisi lisan, upacara keagamaan, perayaan Grebeg/Sekaten, atau sistem kepercayaan tradisi termasuk ke dalam kategori...",
            options: ["Peninggalan Benda (Tangible)", "Peninggalan Tak Benda (Intangible)", "Peninggalan Arkeologis fisik", "Peninggalan Historiografi Kolonial"], correct: 1,
            txt: "Peninggalan Tak Benda (Intangible): Adat tradisi lisan, upacara keagamaan, perayaan Grebeg/Sekaten, atau sistem kepercayaan tradisi."
        }
    ];

    let currentIdx = 0;
    let currentScore = 0;

    const questText = document.getElementById("quest-text");
    const boxOptions = document.getElementById("box-options");
    const boxAlert = document.getElementById("box-alert");
    const btnNext = document.getElementById("btn-next");
    const labelQuest = document.getElementById("label-quest");
    const barStatus = document.getElementById("bar-status");
    const labelScore = document.getElementById("label-score");
    const quizUi = document.getElementById("quiz-ui");
    const scoreUi = document.getElementById("score-ui");
    const totalScore = document.getElementById("total-score");
    const msgEval = document.getElementById("msg-eval");

    function startQuiz() {
        currentIdx = 0;
        currentScore = 0;
        quizUi.style.display = "block";
        scoreUi.style.display = "none";
        renderQuestion();
    }

    function renderQuestion() {
        boxAlert.style.display = "none";
        btnNext.style.display = "none";
        boxOptions.innerHTML = "";

        labelQuest.innerText = `Soal ${currentIdx + 1}/${database.length}`;
        barStatus.style.width = `${(currentIdx / database.length) * 100}%`;
        labelScore.innerText = `Skor: ${currentScore}`;

        const activeData = database[currentIdx];
        questText.innerText = `${currentIdx + 1}. ${activeData.q}`;

        activeData.options.forEach((opt, index) => {
            const button = document.createElement("button");
            button.classList.add("opt-btn");
            button.innerText = opt;
            button.onclick = () => evaluateChoice(index);
            boxOptions.appendChild(button);
        });
    }

    function evaluateChoice(selected) {
        const activeData = database[currentIdx];
        const buttons = boxOptions.querySelectorAll(".opt-btn");

        buttons.forEach(b => b.disabled = true);

        if (selected === activeData.correct) {
            currentScore++;
            buttons[selected].classList.add("correct-ans");
            boxAlert.innerText = `🎉 BENAR! \nCatatan Buku Ujian: ${activeData.txt}`;
            boxAlert.className = "alert-box correct-ui";
        } else {
            buttons[selected].classList.add("wrong-ans");
            buttons[activeData.correct].classList.add("correct-ans");
            boxAlert.innerText = `❌ KURANG TEPAT! \nJawaban Benar: ${activeData.options[activeData.correct]} \n\nSumber Dokumen: ${activeData.txt}`;
            boxAlert.className = "alert-box wrong-ui";
        }

        labelScore.innerText = `Skor: ${currentScore}`;
        boxAlert.style.display = "block";
        btnNext.style.display = "block";
    }

    function moveNext() {
        currentIdx++;
        if (currentIdx < database.length) {
            renderQuestion();
        } else {
            displayFinalScore();
        }
    }

    function displayFinalScore() {
        barStatus.style.width = "100%";
        quizUi.style.display = "none";
        scoreUi.style.display = "block";

        let totalValue = Math.round((currentScore / database.length) * 100);
        totalScore.innerText = `${totalValue} Poin`;

        if (totalValue === 100) {
            msgEval.innerText = "Sempurna! Kamu melibas total 50 variasi soal pindaian tanpa salah satu pun! Nilai A+ sudah terkunci untuk ujianmu besok! 🥇";
        } else if (totalValue >= 80) {
            msgEval.innerText = "Luar biasa hebat! Kamu berhasil mempertahankan konsentrasi tinggi melewati 50 pertanyaan marathon. Kamu sudah sangat siap menghadapi ujian! ✨";
        } else if (totalValue >= 60) {
            msgEval.innerText = "Hasil Cukup Baik. Kamu menguasai sebagian besar materi, namun ada beberapa detail kecil yang terlewat. Silakan ulas kembali materi yang salah!";
        } else {
            msgEval.innerText = "Kamu butuh membaca kembali lembar rangkuman fotomu dengan lebih teliti. Ayo coba lagi ujian marathon ini untuk mengasah ingatanmu! 💪";
        }
    }

    function restartQuiz() {
        startQuiz();
    }

    // Eksekusi otomatis saat pertama kali dibuka
    startQuiz();
</script>
